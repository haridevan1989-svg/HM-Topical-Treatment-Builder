<script type="text/babel">
const { useState, useRef } = React;

// ── Clinical data ──────────────────────────────────────────────────────────
const DRUGS = {
  efudix: {

// ── Helpers ────────────────────────────────────────────────────────────────
function addWeeks(dateStr, weeks) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  d.setDate(d.getDate() + weeks * 7);
  return d.toISOString().split("T")[0];
}

function fmtDate(dateStr) {
  if (!dateStr) return "—";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-AU", { day: "2-digit", month: "short", year: "numeric" });
}

function fmtDateLong(dateStr) {
  if (!dateStr) return "—";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-AU", { day: "2-digit", month: "long", year: "numeric" });
}

function computePhases(zones, startDate, drugKey) {
  const d = DRUGS[drugKey];
  const byPhase = {};
  zones.forEach(z => {
    if (!byPhase[z.phase]) byPhase[z.phase] = [];
    byPhase[z.phase].push(z);
  });
  const phases = Object.keys(byPhase).map(Number).sort((a, b) => a - b);
  const result = {};
  let cursor = startDate;
  phases.forEach(ph => {
    const zonesInPhase = byPhase[ph];
    const maxDuration = Math.max(...zonesInPhase.map(z => (d.indications[z.indication]?.durationWeeks || 4)));
    const maxGap = Math.max(...zonesInPhase.map(z => (d.indications[z.indication]?.gapWeeks || 6)));
    const phStart = cursor;
    const phEnd = addWeeks(cursor, maxDuration);
    result[ph] = { start: phStart, end: phEnd, nextStart: addWeeks(cursor, maxGap), zones: zonesInPhase, durationWeeks: maxDuration };
    cursor = result[ph].nextStart;
  });
  return result;
}

function shortLabel(label) {
  return label
    .replace("Anterior ", "Ant. ")
    .replace("Posterior ", "Post. ")
    .replace("Trapezius", "Trap.")
    .replace("Forearm", "FA")
    .replace("Dorsum", "Dors.")
    .replace("Décolletage", "Décoll.");
}

function maxPhase(zones) {
  return zones.length === 0 ? 1 : Math.max(...zones.map(z => z.phase));
}

function centre(str, width) {
  width = width || 60;
  const pad = Math.max(0, Math.floor((width - str.length) / 2));
  return " ".repeat(pad) + str;
}

  const words = text.split(" ");

  let cur = indent;
  for (const w of words) {
    if ((cur + w).length > width && cur.trim()) { lines.push(cur.trimEnd()); cur = indent + w + " "; }
    else cur += w + " ";
  }
  if (cur.trim()) lines.push(cur.trimEnd());
  return lines.join("\n");
}

function downloadTXT(patientName, patientDOB, d, zones, phaseData, phaseNums, startDate, todayISO, drug) {
  const sections = [];

  // PAGE 1: Cover
  let cover = "\n\n";
  cover += DLINE + "\n";

  cover += "START DATE     " + fmtDateLong(startDate) + "\n";
  cover += "TOTAL PHASES   " + phaseNums.length + "\n\n";
  cover += LINE + "\n\n";
  cover += "PHASE OVERVIEW\n\n";
  phaseNums.forEach(function(ph) {
    const pd = phaseData[ph];
    if (!pd) return;
    const zstr = pd.zones.map(function(z){ return z.label; }).join(" + ");
    cover += "  Phase " + ph + "   " + fmtDate(pd.start) + "  \u2192  " + fmtDate(pd.end) + "  (" + pd.durationWeeks + " week" + (pd.durationWeeks !== 1 ? "s" : "") + ")\n";
    cover += "           " + zstr + "\n\n";
  });
  const lastPD = phaseData[phaseNums[phaseNums.length - 1]];
  if (lastPD) {
    cover += LINE + "\n\n";
    cover += "ESTIMATED COMPLETION   " + fmtDateLong(lastPD.end) + "\n";
    cover += "FINAL REVIEW DUE       " + fmtDateLong(addWeeks(lastPD.end, 8)) + "\n";

  sections.push(cover);

  // PAGE 2: Treatment Areas
  let areas = DLINE + "\n";
  areas += "TREATMENT AREAS BY PHASE\n";
  areas += DLINE + "\n\n";
  phaseNums.forEach(function(ph) {
    const pd = phaseData[ph];

      areas += "\n";
    });
  });
  areas += LINE + "\n\n";
  if (drug === "compound") {
    areas += "SCRIPT TYPE    Compounded preparation \u2014 to compounding chemist\n";
    areas += "               15g per course (face). Repeats required for larger fields.\n";
    areas += "PBS STATUS     Private \u2014 not PBS listed\n";
    areas += "CONSENT        Off-label combination \u2014 informed consent documented\n";
  } else if (drug === "aldara") {
    areas += "PBS STATUS     Restricted benefit (AKs) \u00B7 Private for sBCC\n";
  } else {
    areas += "PBS STATUS     Private \u2014 not PBS listed\n";
  }
  sections.push(areas);

  // PAGE(S): Instructions per indication
  const indGroups = {};
  zones.forEach(function(z) {
    if (!indGroups[z.indication]) indGroups[z.indication] = [];

  });
  const uniqueIndications = Object.keys(indGroups);
  uniqueIndications.forEach(function(indKey) {
    const ind = d.indications[indKey];
    if (!ind || !ind.instructions) return;
    const multiInd = uniqueIndications.length > 1;
    let inst = DLINE + "\n";
    inst += (multiInd ? "INSTRUCTIONS \u2014 " + ind.label.toUpperCase() : "INSTRUCTIONS") + "\n";
    if (multiInd) inst += "Applies to: " + indGroups[indKey].join(", ") + "\n";

    ind.instructions.forEach(function(item, i) {

    ["\u{1F7E1}  REVIEW", "Reaction near eyes or lips",   "Significant irritation or swelling from accidental contact"],
    ["\u{1F7E1}  REVIEW", "Possible allergic reaction",   "Widespread rash, hives, or unusual swelling \u2014 stop immediately"],
    ["\u{1F7E1}  REVIEW", "Concerned about a lesion",     "A spot that looks different, is growing, or bleeding unexpectedly"],
  ];
  warnings.forEach(function(w) {
    warn += w[0] + "\n";
    warn += "  " + w[1] + "\n";
    warn += wrap(w[2], 56, "  ") + "\n\n";
  });
  warn += LINE + "\n\n";
  warn += wrap("For non-urgent questions, send a photo for review. For urgent concerns, call during business hours or present to your nearest Emergency Department after hours.", 58, "  ") + "\n\n";
  warn += LINE + "\n\n";
  warn += "Prescribed by:  " + DOCTOR + "\n";
  warn += "Date:           " + fmtDateLong(todayISO) + "\n\n";
  warn += "Ongoing skin surveillance recommended every 6\u201312 months.\n";
  sections.push(warn);

  const fullText = sections.join(PAGE + "\n");
  const blob = new Blob([fullText], { type: "text/plain;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  const safe = patientName.trim().replace(/[^a-zA-Z0-9]/g, "_") || "patient";
  a.href     = url;
  a.download = "TreatmentPlan_" + safe + "_" + todayISO + ".txt";
  a.click();
  URL.revokeObjectURL(url);
}

function App() {
  const [patientName, setPatientName] = useState("");
  const [patientDOB, setPatientDOB]   = useState("");
  const [drug, setDrug]               = useState("efudix");
  const [zones, setZones]             = useState([]);
  const [startDate, setStartDate]     = useState(todayISO);
  const [freeText, setFreeText]       = useState("");
  const [showPDF, setShowPDF]         = useState(false);
  const [showText, setShowText]       = useState(false);
  const [copied, setCopied]           = useState(false);
  const [diagTab, setDiagTab]         = useState("body");
  const dragId     = useRef(null);
  const dragOverId = useRef(null);

  const d       = DRUGS[drug];
  const indKeys = Object.keys(d.indications);
  const phaseData = computePhases(zones, startDate, drug);
  const phaseNums = [...new Set(zones.map(z => z.phase))].sort((a, b) => a - b);
  const allowedZones = d.allowedZones || null; // null = all zones allowed
  const numPhases = maxPhase(zones);
  const canGen    = patientName.trim() && zones.length > 0 && startDate;

  function toggleZone(zone) {
    if (allowedZones && !allowedZones.includes(zone.id)) return; // blocked for this drug
    setZones(prev => {
      if (prev.find(z => z.id === zone.id)) return prev.filter(z => z.id !== zone.id);
      return [...prev, { id: zone.id, label: zone.label, indication: indKeys[0], notes: "", custom: false, phase: maxPhase(prev) || 1 }];
    });
  }

  function addFreeZone() {
    const text = freeText.trim();
    if (!text) return;
    setZones(prev => [...prev, { id: "custom_" + Date.now(), label: text, indication: indKeys[0], notes: "", custom: true, phase: maxPhase(prev) || 1 }]);
    setFreeText("");
  }

  function updateZone(id, field, val) {
    setZones(prev => prev.map(z => z.id === id ? { ...z, [field]: val } : z));
  }

                        </div>
                      </div>
                      <div className="tl-dates">{fmtDate(pd.start)} → {fmtDate(pd.end)}</div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Zone cards */}
            {zones.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">👆</div>
                Type a spot above or tap the body diagram to add treatment areas
              </div>
            ) : (
              phaseNums.map(ph => {
                const col  = PHASE_COLS[(ph-1) % PHASE_COLS.length];
                const soft = PHASE_SOFT[(ph-1) % PHASE_SOFT.length];
                const pd   = phaseData[ph];
                const zonesInPhase = zones.filter(z => z.phase === ph);
                return (
                  <div key={ph} className="phase-section">
                    <div className="phase-header" style={{borderColor:col}}>
                      <span className="phase-pill" style={{background:soft,color:col}}>Phase {ph}</span>
                      {pd && <span className="phase-dates">{fmtDate(pd.start)} — {fmtDate(pd.end)} · {pd.durationWeeks} weeks</span>}
                    </div>
                    {zonesInPhase.map(z => {
                      const ind = d.indications[z.indication];
                      return (
                        <div key={z.id} className="zone-card"
                          draggable
                          onDragStart={e => onDragStart(e, z.id)}
                          onDragOver={e => onDragOver(e, z.id)}
                          onDrop={onDrop}>
                          <div className="zone-hd">
                            <span className="drag-handle">⠿</span>
                            <div className="zone-phase-dot" style={{background:col}}/>
                            <div className="zone-lbl">
                              {z.label}
                              {z.custom && <span className="custom-badge">spot</span>}
                            </div>
                            <div className="zone-controls">
                              <select className="phase-select-sm" value={z.phase}
                                onChange={e => updateZone(z.id, "phase", Number(e.target.value))}>
                                {Array.from({length: numPhases + 1}, (_, i) => i + 1).map(p => (
                                  <option key={p} value={p}>Phase {p}</option>
                                ))}
                              </select>
                              <button className="zone-x" onClick={() => removeZone(z.id)}>×</button>
                            </div>
                          </div>
                          <div className="zone-body">
                            <div>
                              <div className="mini-lbl">Indication</div>
                              <select className="ind-select" value={z.indication}
                                onChange={e => updateZone(z.id, "indication", e.target.value)}>
                                {indKeys.map(k => <option key={k} value={k}>{d.indications[k].label}</option>)}
                              </select>
                            </div>
                            {ind && (
                              <div className="info-box">
                                <div className="info-grid">
                                  <div className="info-item"><strong>Frequency</strong>{ind.freq}</div>
                                  <div className="info-item"><strong>Duration</strong>{ind.durationLabel}</div>
                                  <div className="info-item"><strong>Reviews</strong>{ind.review}</div>
                                  <div className="info-item"><strong>Target</strong>{ind.target}</div>
                                </div>
                                <div className="info-note">{ind.note}</div>
                              </div>
                            )}
                            <div>
                              <div className="mini-lbl">Doctor's notes (optional)</div>
                              <textarea className="notes-ta"
                                placeholder="e.g. spot only, avoid periorbital area, patient tolerated well previously…"
                                value={z.notes}
                                onChange={e => updateZone(z.id, "notes", e.target.value)} />
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })
            )}

            <div className="gen-row">
              {!canGen && (
                <div className="gen-hint">
                  {!patientName.trim() ? "Enter patient name to continue"
                    : !startDate ? "Set a start date"
                    : "Select at least one treatment area"}
                </div>
              )}
              <button className="gen-btn" disabled={!canGen} onClick={() => setShowPDF(true)}>
                Generate Plan →
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* ── PDF Modal ── */}
      {showPDF && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && setShowPDF(false)}>
          <div className="modal">
            <button className="modal-close" onClick={() => setShowPDF(false)}>×</button>

            {/* Header */}
            <div className="m-header">
              <div>
                <div className="m-title">
                  <em style={{color:d.col}}>{d.name}</em> Treatment Plan
                </div>
              </div>
              <div className="m-meta">
                <strong>Dr H. Balachandran</strong><br/>
                MBBS · FRACGP<br/>
                {fmtDateLong(todayISO)}
              </div>
            </div>

            {/* Patient strip */}
            <div className="m-patient">
              <div><div className="pl">Patient</div><div className="pv">{patientName}</div></div>
              {patientDOB && <><div className="m-pdiv"/><div><div className="pl">Date of Birth</div><div className="pv">{patientDOB}</div></div></>}
              <div><div className="pl">Treatment Start</div><div className="pv">{fmtDateLong(startDate)}</div></div>
              <div style={{marginLeft:"auto"}}><div className="pl">Total Phases</div><div className="pv">{phaseNums.length}</div></div>
            </div>

            {/* Prescription */}
            <div className="m-slbl">Prescription</div>
            <div className="m-rx">
              <div className="m-rx-name">{d.name} <span>({d.generic})</span></div>
              <div className="m-rx-detail">Private prescription · 40 g tube · 1 repeat per phase</div>
              <div className="m-rx-grid">
                <div className="m-rx-cell"><div className="cl">Drug</div><div className="cv">{d.name}</div></div>
                <div className="m-rx-cell"><div className="cl">Phases</div><div className="cv">{phaseNums.length} sequential course{phaseNums.length !== 1 ? "s" : ""}</div></div>
                <div className="m-rx-cell"><div className="cl">PBS Status</div><div className="cv">{drug === "klisyri" ? "Private — not PBS listed" : drug === "aldara" ? "PBS restricted benefit (AKs)" : "Private — not PBS listed"}</div></div>
              </div>
            </div>

            {/* Timeline overview */}
            <div className="m-slbl">Treatment Timeline</div>
            <div className="m-gen" style={{marginBottom:8}}>
              {phaseNums.map(ph => {
                const pd   = phaseData[ph];
                const col  = PHASE_COLS[(ph-1) % PHASE_COLS.length];
                const soft = PHASE_SOFT[(ph-1) % PHASE_SOFT.length];
                return (
                  <div key={ph} className="m-tl-row">
                    <div className="m-tl-pill" style={{background:soft,color:col}}>Phase {ph}</div>
                    <div className="m-tl-info">
                      {pd.zones.map(z => z.label).join(" + ")}
                      <span style={{color:"#9C9089"}}> · {pd.durationWeeks} week{pd.durationWeeks !== 1 ? "s" : ""}</span>
                    </div>
                    <div className="m-tl-dates">{fmtDate(pd.start)} → {fmtDate(pd.end)}</div>
                  </div>
                );
              })}
              {lastPhaseData && (
                <div style={{fontSize:12,color:"#9C9089",borderTop:"1px solid #E8E4DF",paddingTop:8,marginTop:8}}>
                  Estimated completion: <strong style={{color:"#1C1814"}}>{fmtDateLong(lastPhaseData.end)}</strong>
                  &nbsp;·&nbsp; Final review: <strong style={{color:"#1C1814"}}>{fmtDateLong(addWeeks(lastPhaseData.end, 8))}</strong>
                </div>
              )}
            </div>

            {/* Phase details */}
            <div className="m-slbl">Treatment Areas by Phase</div>
            {phaseNums.map(ph => {
              const pd   = phaseData[ph];
              const col  = PHASE_COLS[(ph-1) % PHASE_COLS.length];
              const soft = PHASE_SOFT[(ph-1) % PHASE_SOFT.length];
              return (
                <div key={ph} className="m-phase-block">
                  <div className="m-phase-hd" style={{background:soft,borderColor:col+"33"}}>
                    <span className="m-phase-hd-pill" style={{background:col,color:"#fff"}}>Phase {ph}</span>
                    <span style={{fontSize:13,color:"#1C1814",fontWeight:500}}>
                      {pd.zones.map(z => z.label).join(" + ")}
                    </span>
                    <span className="m-phase-hd-dates">{fmtDate(pd.start)} → {fmtDate(pd.end)} · {pd.durationWeeks} weeks</span>
                  </div>
                  {pd.zones.map(z => {
                    const ind = d.indications[z.indication];
                    return (
                      <div key={z.id} className="m-zone">
                        <div className="m-zone-head" style={{color:col}}>{z.label}</div>
                        <div className="m-ind-chip" style={{background:soft,color:col}}>{ind.label}</div>
                        <div className="m-zone-grid">
                          <div className="m-zone-row"><span>Frequency: </span>{ind.freq}</div>
                          <div className="m-zone-row"><span>Duration: </span>{ind.durationLabel}</div>
                          <div className="m-zone-row"><span>Reviews: </span>{ind.review}</div>
                          <div className="m-zone-row"><span>Target: </span>{ind.target}</div>
                        </div>
                        <div className="m-zone-clinote">{ind.note}</div>
                        {z.notes.trim() && (
                          <div className="m-zone-drtext">
                            <strong>Doctor's Notes</strong>{z.notes}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}

            {/* General instructions — per indication */}
            {(() => {
              // Group zones by indication key
              const indGroups = {};
              zones.forEach(z => {
                if (!indGroups[z.indication]) indGroups[z.indication] = [];
                indGroups[z.indication].push(z.label);
              });
              const uniqueIndications = Object.keys(indGroups);
              return uniqueIndications.map(indKey => {
                const ind = d.indications[indKey];
                if (!ind || !ind.instructions) return null;
                const zoneLabels = indGroups[indKey].join(", ");
                const multiInd = uniqueIndications.length > 1;
                return (
                  <div key={indKey}>
                    <div className="m-slbl">
                      Instructions{multiInd ? ` — ${ind.label}` : ""}
                      {multiInd && <span style={{fontSize:11,fontWeight:400,color:"#9C9089",marginLeft:8}}>({zoneLabels})</span>}
                    </div>
                    <div className="m-gen">
                      <ul>
                        {ind.instructions.map(([key, text]) => (
                          <li key={key} dangerouslySetInnerHTML={{__html: text}} />
                        ))}
                      </ul>
                    </div>
                  </div>
                );
              });
            })()}

            {/* Early review */}
            <div className="m-slbl" style={{color:"#C4503A",borderBottomColor:"#F0E0DC"}}>⚠ Book an Earlier Appointment If…</div>
            <div className="m-early">
              <div className="m-early-intro">
                The following are <strong>not</strong> normal parts of treatment. If any occur, <strong>stop the cream and contact the practice</strong> to arrange an earlier review. You can send a photo via the practice messaging system.
              </div>
              <div className="m-early-grid">
                {[
                  ["●","#C4503A","Signs of infection","Increasing warmth, swelling, pus, or weeping that is not settling"],
                  ["●","#C4503A","Spreading redness","Redness or crusting spreading well beyond the intended treatment area"],
                  ["●","#C4503A","Severe pain","Discomfort is expected — severe pain not controlled with paracetamol is not"],
                  ...(drug !== "klisyri" ? [["●","#C4503A","Fever or flu-like symptoms","Feeling unwell or shivering — especially relevant with Aldara"]] : [["●","#C4503A","Severe eye irritation","If ointment contacts eyes — rinse immediately and contact us"]]),
                  ...(drug !== "klisyri" ? [["●","#B08A00","No reaction by day 10","Contact us — the cream may not be absorbing correctly"]] : [["●","#B08A00","No reaction after course completion","If no redness or scaling occurred at all — contact us to review"]]),
                  ["●","#B08A00","Reaction near eyes, lips, or nostrils","Significant irritation or swelling from accidental contact"],
                  ["●","#B08A00","Allergic reaction","Widespread rash, hives, or unusual swelling — stop immediately"],
                  ["●","#B08A00","Concerned about a lesion","A spot that looks different, is growing, bleeding, or not behaving as expected"],
                ].map(([icon, head, body]) => (
                  <div key={head} className="m-early-item">
                    <div className="m-early-icon">{icon}</div>
                    <div>
                      <div className="m-early-head">{head}</div>
                      <div className="m-early-body">{body}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="m-early-footer">
                For non-urgent questions, send a photo for review. For urgent concerns, call during business hours or present to your nearest Emergency Department after hours.
              </div>
            </div>

            {/* Footer */}
            <div className="m-footer">
              <div>
                Ongoing skin surveillance recommended every 6–12 months.
              </div>
              <div style={{textAlign:"right"}}>
                <div className="sig-line"/>
                Dr H. Balachandran MBBS · FRACGP<br/>
                {fmtDateLong(todayISO)}
              </div>
            </div>

            <div className="m-actions">
              <button className="btn-back" onClick={() => setShowPDF(false)}>← Edit</button>
              <button className="btn-print" onClick={() => { setShowText(t => !t); setCopied(false); }}>
                {showText ? "Hide Text" : "📋 Show Text for Best Practice"}
              </button>
            </div>

            {/* Inline styled panel */}
            {showText && (() => {
              const txt = buildTXT(patientName, patientDOB, d, zones, phaseData, phaseNums, startDate, todayISO, drug);
              const phaseColors = ["blue","red","green","gold","purple"];
              const phaseBg = ["#E8F0F8","#FBF0EE","#EBF3EE","#F5EDD8","#F3EDF8"];
              const phaseCol = ["#2C6EAB","#C4503A","#3A6B4C","#8B6914","#7B3FA0"];

              // build per-indication instruction groups
              const indGroups = {};
              zones.forEach(z => {
                if (!indGroups[z.indication]) indGroups[z.indication] = [];
                indGroups[z.indication].push(z.label);
              });
              const uniqueInds = Object.keys(indGroups);

              const warnItems = [
                ["●","#C4503A","Signs of infection","Increasing warmth, swelling, pus, or weeping that is not settling"],
                ["●","#C4503A","Spreading redness","Redness or crusting spreading well beyond the intended treatment area"],
                ["●","#C4503A","Severe pain","Discomfort is expected — severe pain not controlled with paracetamol is not"],
                ...(drug !== "klisyri" ? [["●","#C4503A","Fever or flu-like symptoms","Feeling unwell or shivering — especially relevant with Aldara"]] : [["●","#C4503A","Severe eye irritation","If ointment contacts eyes — rinse immediately and contact us"]]),
                ...(drug !== "klisyri" ? [["●","#B08A00","No reaction by day 10","Contact us — the cream may not be absorbing correctly"]] : [["●","#B08A00","No reaction after course","If no redness or scaling occurred — contact us to review"]]),
                ["●","#B08A00","Reaction near eyes or lips","Significant irritation or swelling from accidental contact"],
                ["●","#B08A00","Possible allergic reaction","Widespread rash, hives, or unusual swelling — stop immediately"],
                ["●","#B08A00","Concerned about a lesion","A spot that looks different, growing, bleeding, or not behaving as expected"],
              ];

              return (
                <div className="txt-panel">
                  <div className="txt-panel-bar">
                    <span className="txt-panel-label">📋 Ready to paste into Best Practice</span>
                    <button
                      className={"btn-copy" + (copied ? " done" : "")}
                      onClick={() => {
                        const htmlContent = buildClipboardHTML(patientName, patientDOB, d, zones, phaseData, phaseNums, startDate, todayISO, drug);
                        const plainContent = buildTXT(patientName, patientDOB, d, zones, phaseData, phaseNums, startDate, todayISO, drug);
                        try {
                          const item = new ClipboardItem({
                            'text/html':  new Blob([htmlContent],  {type:'text/html'}),
                            'text/plain': new Blob([plainContent], {type:'text/plain'}),
                          });
                          navigator.clipboard.write([item]).then(() => {
                            setCopied(true);
                            setTimeout(() => setCopied(false), 2500);
                          });
                        } catch(e) {
                          // Fallback to plain text if ClipboardItem not supported
                          navigator.clipboard.writeText(plainContent).then(() => {
                            setCopied(true);
                            setTimeout(() => setCopied(false), 2500);
                          });
                        }
                      }}>
                      {copied ? "✓ Copied!" : "Copy for Best Practice"}
                    </button>
                  </div>

                  <div className="rp-panel">

                    {/* Title */}
                    <div className="rp-title">{d.name} Treatment Plan</div>
                    <div className="rp-drug">{d.generic}</div>
                    <div className="rp-meta">
                      Dr H. Balachandran MBBS · FRACGP &nbsp;·&nbsp; {fmtDateLong(todayISO)}<br/>
                      <strong style={{color:"#1C1814"}}>{patientName}</strong>
                      {patientDOB && <> &nbsp;·&nbsp; DOB: {patientDOB}</>}
                      &nbsp;·&nbsp; Start: {fmtDateLong(startDate)} &nbsp;·&nbsp; {phaseNums.length} phase{phaseNums.length !== 1 ? "s" : ""}
                    </div>

                    {/* Treatment areas by phase */}
                    <div className="rp-section">
                      <div className="rp-h blue">Treatment Areas by Phase</div>
                      {phaseNums.map((ph, i) => {
                        const pd = phaseData[ph];
                        if (!pd) return null;
                        const bg  = phaseBg[(i) % phaseBg.length];
                        const col = phaseCol[(i) % phaseCol.length];
                        return (
                          <div key={ph} className="rp-phase" style={{background:bg,border:`1.5px solid ${col}22`}}>
                            <div className="rp-phase-label" style={{color:col}}>Phase {ph} &nbsp;·&nbsp; {fmtDate(pd.start)} → {fmtDate(pd.end)} &nbsp;·&nbsp; {pd.durationWeeks} week{pd.durationWeeks!==1?"s":""}</div>
                            {pd.zones.map(z => {
                              const ind = d.indications[z.indication];
                              if (!ind) return null;
                              return (
                                <div key={z.id} style={{marginBottom:10}}>
                                  <div className="rp-phase-area">{z.label}</div>
                                  <div style={{fontSize:12,color:col,fontWeight:500,marginBottom:4}}>{ind.label}</div>
                                  <div className="rp-phase-rows">
                                    <div className="rp-phase-row"><span>Frequency</span>{ind.freq}</div>
                                    <div className="rp-phase-row"><span>Duration</span>{ind.durationLabel}</div>
                                    <div className="rp-phase-row"><span>Reviews</span>{ind.review}</div>
                                    <div className="rp-phase-row"><span>Endpoint</span>{ind.target}</div>
                                  </div>
                                  {z.notes.trim() && <div className="rp-phase-note">Doctor's notes: {z.notes}</div>}
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>

                    {/* Instructions */}
                    <div className="rp-section">
                      <div className="rp-h green">Instructions</div>
                      {uniqueInds.map(indKey => {
                        const ind = d.indications[indKey];
                        if (!ind || !ind.instructions) return null;
                        return (
                          <div key={indKey} className="rp-inst-section">
                            {uniqueInds.length > 1 && (
                              <div className="rp-inst-label">{ind.label} — {indGroups[indKey].join(", ")}</div>
                            )}
                            <ol className="rp-inst-list">
                              {ind.instructions.map(([key, text], i) => (
                                <li key={key}>
                                  <div className="rp-inst-num">{i+1}</div>
                                  <div dangerouslySetInnerHTML={{__html: text}}/>
                                </li>
                              ))}
                            </ol>
                          </div>
                        );
                      })}
                    </div>

                    {/* When to seek review */}
                    <div className="rp-section">
                      <div className="rp-h red">⚠ When to Seek an Earlier Review</div>
                      <div style={{fontSize:12.5,color:"#6B6157",marginBottom:12}}>
                        The following are <strong>not</strong> normal parts of treatment. Stop the cream and contact us if any of these occur.
                      </div>
                      {warnItems.map(([bullet, col, head, body]) => (
                        <div key={head} className="rp-warn-item">
                          <div className="rp-warn-icon" style={{color:col}}>{bullet}</div>
                          <div>
                            <div className="rp-warn-head">{head}</div>
                            <div className="rp-warn-body">{body}</div>
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* Footer */}
                    <div className="rp-footer">
                      <span>Ongoing skin surveillance recommended every 6–12 months.</span>
                      <span>Dr H. Balachandran MBBS · FRACGP</span>
                    </div>

                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
